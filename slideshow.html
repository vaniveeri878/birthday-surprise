<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Video 🎬</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ee9ca7, #ffdde1);
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    h1 {
      color: #fff;
      margin-top: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    #greeting {
      color: #fff;
      font-size: 1.5em;
      margin-top: 10px;
    }
    #specialMessage {
      color: gold;
      font-size: 1.8em;
      margin-top: 15px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
    }
    video {
      width: 80%;
      margin-top: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    a {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background-color: #fff;
      color: #ee9ca7;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    #confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <h1>🎂 Birthday Video 💖</h1>
  <p id="greeting"></p>
  <p id="specialMessage"></p>
  <div class="mySlides fade">
  <video width="640" height="360" controls autoplay>
    <source src="pavani.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

  <!-- Back button -->
  <br>
  <a href="blast.html">⬅ Back to Memories</a>

  <!-- Confetti -->
  <canvas id="confetti"></canvas>

  <script>
    // Personalized greeting based on name stored in session
    const name = sessionStorage.getItem("userName");
    if (name) {
      document.getElementById("greeting").textContent = "Welcome, " + name.charAt(0).toUpperCase() + name.slice(1) + "!";
      if (name.toLowerCase() === "pavani") {
        document.getElementById("specialMessage").textContent = "🎉 Happy Birthday Pavani 🎂💖";
      }
    }

    // Confetti animation
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let confettis = [];
    for (let i = 0; i < 150; i++) {
      confettis.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 0.5,
        color: `hsl(${Math.random() * 360}, 100%, 70%)`
      });
    }
    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < confettis.length; i++) {
        let c = confettis[i];
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2, false);
        ctx.fillStyle = c.color;
        ctx.fill();
        c.y += c.d * 4;
        if (c.y > canvas.height) c.y = 0;
      }
      requestAnimationFrame(animateConfetti);
    }
    animateConfetti();
  </script>

</body>
</html>
